  <text x="40" y="140" font-size="11" font-weight="700" fill="#8B3A47" letter-spacing="1.5">01  İLAÇ EKLEME</text>
  <line x1="40" y1="148" x2="1160" y2="148" stroke="#C9B891" stroke-width="1"/>

  <g>
