<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#8B3A47"/>
    </marker>
    <marker id="arS" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5a3d3d"/>
    </marker>
    <marker id="arG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5e8a5a"/>
    </marker>
  </defs>

  <rect width="1200" height="900" fill="#F5EFE7"/>

  <text x="40" y="50" font-size="28" font-weight="700" fill="#1C1C1C">Sohbet &amp; Tool Calling</text>
  <line x1="40" y1="64" x2="170" y2="64" stroke="#8B3A47" stroke-width="2"/>
  <text x="40" y="92" font-size="14" fill="#7a5a5a">Doğal dil sorgu → Gemini agent → 9 typed tool → PostgreSQL → akıcı yanıt</text>

  <g>
    <rect x="40" y="125" width="430" height="80" rx="14" fill="#F5D6D6" stroke="#8B3A47" stroke-width="1.5"/>
    <path d="M 70 205 L 60 222 L 90 205 Z" fill="#F5D6D6" stroke="#8B3A47" stroke-width="1.5"/>
    <text x="58" y="148" font-size="11" font-weight="700" fill="#8B3A47" letter-spacing="1.2">HASTA · CHAT</text>
    <text x="58" y="174" font-size="15" font-weight="600" fill="#1C1C1C">"Bugün hangi ilaçları aldım,</text>
    <text x="58" y="194" font-size="15" font-weight="600" fill="#1C1C1C">Atorvastatin almam lazım mı?"</text>
  </g>

  <g>
    <rect x="510" y="125" width="650" height="80" rx="10" fill="#FFFFFF" stroke="#C9B891" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="528" y="148" font-size="11" font-weight="700" fill="#7a5a5a" letter-spacing="1.2">BAĞLAM (her istekle eklenir)</text>
    <text x="528" y="172" font-size="12" fill="#1C1C1C">• System prompt: rol, kısıtlar, TR/EN, güvenlik kuralları</text>
    <text x="528" y="190" font-size="12" fill="#1C1C1C">• Son 10 mesaj geçmişi · userId · oturum metadatası</text>
  </g>

  <line x1="255" y1="232" x2="255" y2="265" stroke="#8B3A47" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="835" y1="205" x2="835" y2="265" stroke="#5a3d3d" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arS)"/>
  <text x="280" y="252" font-size="11" font-weight="600" fill="#8B3A47">tRPC chatStream</text>

  <g>
    <rect x="280" y="265" width="640" height="120" rx="12" fill="#8B3A47" stroke="#6E2A36" stroke-width="2"/>
    <text x="300" y="293" font-size="11" font-weight="700" fill="#F0DCDF" letter-spacing="1.2">02 · AI İŞLEME</text>
    <text x="300" y="322" font-size="20" font-weight="700" fill="#FFFFFF">Gemini 2.5 Flash · agent-service</text>
    <text x="300" y="346" font-size="13" fill="#F0DCDF">ReAct döngüsü: think → tool select → observe → answer</text>
    <text x="300" y="366" font-size="12" fill="#E8C5C9">Function calling · streaming · max 5 iterasyon · timeout 30 sn</text>

    <g transform="translate(820 295)">
      <rect width="80" height="76" rx="10" fill="#6E2A36" stroke="#FFFFFF" stroke-width="1"/>
      <text x="40" y="22" text-anchor="middle" font-size="10" fill="#F0DCDF">iterasyon</text>
      <text x="40" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#FFFFFF">↻</text>
      <text x="40" y="68" text-anchor="middle" font-size="10" fill="#F0DCDF">max 5</text>
    </g>
  </g>

  <line x1="600" y1="385" x2="600" y2="430" stroke="#8B3A47" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="610" y="412" font-size="11" font-weight="600" fill="#8B3A47">tool seç + parametre üret</text>

  <g>
    <rect x="40" y="430" width="1120" height="280" rx="12" fill="#FFFFFF" stroke="#C9B891" stroke-width="1.5"/>
    <text x="60" y="458" font-size="11" font-weight="700" fill="#8B3A47" letter-spacing="1.2">03 · TOOL HANDLERS  ·  9 typed function (Zod şema doğrulamalı)</text>

    <g>
      <rect x="60" y="475" width="540" height="220" rx="8" fill="#FBF6EE" stroke="#C9B891" stroke-width="1"/>
      <rect x="60" y="475" width="540" height="28" rx="8" fill="#E6D89E"/>
      <text x="78" y="495" font-size="13" font-weight="700" fill="#1C1C1C" letter-spacing="0.8">READ-ONLY  ·  KARAR DESTEK  ·  7 araç</text>

      <g font-family="Menlo, monospace" font-size="11" font-weight="600" fill="#1C1C1C">
        <rect x="78" y="518" width="245" height="32" rx="5" fill="#FFFFFF" stroke="#C9B891"/>
        <text x="92" y="538">get_medication_list</text>

        <rect x="338" y="518" width="245" height="32" rx="5" fill="#FFFFFF" stroke="#C9B891"/>
        <text x="352" y="538">get_today_intake_status</text>

        <rect x="78" y="556" width="245" height="32" rx="5" fill="#FFFFFF" stroke="#C9B891"/>
        <text x="92" y="576">get_next_dose</text>

        <rect x="338" y="556" width="245" height="32" rx="5" fill="#FFFFFF" stroke="#C9B891"/>
        <text x="352" y="576">get_adherence_summary</text>

        <rect x="78" y="594" width="245" height="32" rx="5" fill="#FFFFFF" stroke="#C9B891"/>
        <text x="92" y="614">get_medication_usage_info</text>

        <rect x="338" y="594" width="245" height="32" rx="5" fill="#FFFFFF" stroke="#C9B891"/>
        <text x="352" y="614">get_medication_duration</text>

        <rect x="78" y="632" width="505" height="32" rx="5" fill="#FFFFFF" stroke="#C9B891"/>
        <text x="92" y="652">get_stock_status</text>
      </g>

      <text x="78" y="684" font-size="10" fill="#7a5a5a">SELECT sorguları · Prisma · userId scope · &lt; 50 ms</text>
    </g>

    <g>
      <rect x="620" y="475" width="540" height="220" rx="8" fill="#FBF6EE" stroke="#C9B891" stroke-width="1"/>
      <rect x="620" y="475" width="540" height="28" rx="8" fill="#A8C5A0"/>
      <text x="638" y="495" font-size="13" font-weight="700" fill="#1C1C1C" letter-spacing="0.8">WRITE  ·  KAYIT İŞLEMLERİ  ·  2 araç</text>

      <g font-family="Menlo, monospace" font-size="11" font-weight="600" fill="#1C1C1C">
        <rect x="638" y="518" width="505" height="44" rx="5" fill="#FFFFFF" stroke="#5e8a5a"/>
        <text x="652" y="538">record_medication_intake(med, status)</text>
        <text x="652" y="554" font-family="Helvetica, Arial" font-size="10" font-weight="400" fill="#5a3d3d">status ∈ {TAKEN, SKIPPED} · idempotent · timestamp</text>

        <rect x="638" y="568" width="505" height="44" rx="5" fill="#FFFFFF" stroke="#5e8a5a"/>
        <text x="652" y="588">log_side_effect(description, severity?)</text>
        <text x="652" y="604" font-family="Helvetica, Arial" font-size="10" font-weight="400" fill="#5a3d3d">severity ∈ {mild, moderate, severe} · → bakıcı uyarısı</text>
      </g>

      <text x="638" y="640" font-size="11" font-weight="700" fill="#8B3A47">ONAY KAPISI</text>
      <text x="638" y="658" font-size="10" fill="#5a3d3d">Yazma çağrıları → kullanıcıya "Onay" balonu (Etkileşim)</text>
      <text x="638" y="674" font-size="10" fill="#5a3d3d">Hasta evet derse → INSERT · hayır → tool sonucu "iptal"</text>
      <text x="638" y="690" font-size="10" fill="#5a3d3d">audit log · son-yazan kazanır</text>
    </g>
  </g>

  <line x1="600" y1="710" x2="600" y2="745" stroke="#5a3d3d" stroke-width="1.5" marker-end="url(#arS)"/>
  <text x="610" y="730" font-size="10" fill="#5a3d3d">Prisma · parametrize</text>

  <g>
    <rect x="380" y="745" width="440" height="60" rx="10" fill="#2A2A2A"/>
    <text x="600" y="772" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">PostgreSQL  ·  medications · intakes · side_effects</text>
    <text x="600" y="790" text-anchor="middle" font-size="11" fill="#D4A0A8">indexed (userId, takenAt) · transactional · row-level userId scope</text>
  </g>

  <path d="M 380 775 Q 130 775 130 470 Q 130 325 280 325" fill="none" stroke="#5a3d3d" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arS)"/>
  <text x="60" y="555" font-size="11" font-weight="700" fill="#5a3d3d">tool result</text>
  <text x="60" y="572" font-size="10" fill="#5a3d3d">JSON → LLM</text>

  <g>
    <rect x="850" y="125" width="310" height="80" rx="14" fill="#C8E0C2" stroke="#5e8a5a" stroke-width="1.5"/>
    <path d="M 1130 205 L 1140 222 L 1110 205 Z" fill="#C8E0C2" stroke="#5e8a5a" stroke-width="1.5"/>
    <text x="868" y="148" font-size="11" font-weight="700" fill="#3d6a3d" letter-spacing="1.2">ASİSTAN · CEVAP</text>
    <text x="868" y="172" font-size="13" font-weight="600" fill="#1C1C1C">"Bugün 3 ilacınızdan 2'sini</text>
    <text x="868" y="190" font-size="13" font-weight="600" fill="#1C1C1C">aldınız. Atorvastatin 30 dk geçti."</text>
  </g>

  <path d="M 920 295 Q 1005 250 1005 205" fill="none" stroke="#5e8a5a" stroke-width="1.5" marker-end="url(#arG)"/>
  <text x="1020" y="248" font-size="11" font-weight="700" fill="#5e8a5a">stream</text>

  <g transform="translate(40 830)">
    <text x="0" y="14" font-size="11" font-weight="700" fill="#7a5a5a" letter-spacing="1.2">RENK ANAHTARI</text>
    <g transform="translate(0 26)" font-size="11" fill="#1C1C1C">
      <rect width="14" height="14" fill="#F5D6D6" stroke="#8B3A47"/><text x="22" y="11">Etkileşim</text>
      <rect x="110" width="14" height="14" fill="#8B3A47"/><text x="132" y="11">AI işleme</text>
      <rect x="230" width="14" height="14" fill="#E6D89E"/><text x="252" y="11">Read-only / karar destek</text>
      <rect x="430" width="14" height="14" fill="#A8C5A0"/><text x="452" y="11">Write / başarı</text>
      <rect x="580" width="14" height="14" fill="#2A2A2A"/><text x="602" y="11">Veri katmanı</text>
      <rect x="710" width="14" height="14" fill="#FFFFFF" stroke="#C9B891" stroke-dasharray="3 2"/><text x="732" y="11">Bağlam / fallback</text>
    </g>
  </g>
</svg>
