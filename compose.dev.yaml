name: medsafe-dev

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: medsafe
      POSTGRES_PASSWORD: medsafe-dev
      POSTGRES_DB: medsafe
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medsafe -d medsafe -h localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - medsafe-dev-network

networks:
  medsafe-dev-network:
    driver: bridge
    name: medsafe-dev-network
