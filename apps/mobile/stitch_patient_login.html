<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Patient Login Screen</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#d99696",
                        "background-light": "#f8f6f6",
                        "background-dark": "#1e1414",
                        "surface-light": "#ffffff",
                        "surface-dark": "#2d2424",
                        "text-main-light": "#161313",
                        "text-main-dark": "#f0ecec",
                        "text-sub-light": "#6b5e5e",
                        "text-sub-dark": "#a09090",
                        "border-light": "#e3dede",
                        "border-dark": "#4a3e3e",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body>
<div class="relative flex min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden font-display transition-colors duration-200">
<!-- Main Content Wrapper -->
<main class="flex flex-1 flex-col justify-center px-6 py-8 sm:px-8">
<!-- Header Section -->
<div class="mb-10 text-center">
<div class="flex justify-center mb-6">
<!-- Icon or Logo placeholder if needed, using a visual element -->
<div class="h-20 w-20 rounded-full bg-primary/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined" style="font-size: 40px;">medication</span>
</div>
</div>
<h1 class="text-text-main-light dark:text-text-main-dark text-4xl font-bold tracking-tight leading-tight mb-3">
                    Welcome Back!
                </h1>
<p class="text-text-sub-light dark:text-text-sub-dark text-lg font-normal leading-normal">
                    Please log in to manage your meds.
                </p>
</div>
<!-- Form Section -->
<form class="flex w-full flex-col gap-5 max-w-[480px] mx-auto" onsubmit="event.preventDefault();">
<!-- Phone/ID Input -->
<div class="flex flex-col gap-2">
<label class="sr-only" for="phone">Phone Number or Patient ID</label>
<input class="form-input flex w-full resize-none rounded-xl text-text-main-light dark:text-text-main-dark bg-surface-light dark:bg-surface-dark border border-border-light dark:border-border-dark focus:border-primary focus:ring-2 focus:ring-primary/20 h-16 px-5 text-xl placeholder:text-text-sub-light/70 dark:placeholder:text-text-sub-dark/70 transition-all shadow-sm" id="phone" placeholder="Phone Number or Patient ID" type="text"/>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<label class="sr-only" for="password">Password</label>
<div class="relative flex w-full items-center rounded-xl shadow-sm">
<input class="form-input flex w-full flex-1 resize-none rounded-xl text-text-main-light dark:text-text-main-dark bg-surface-light dark:bg-surface-dark border border-border-light dark:border-border-dark focus:border-primary focus:ring-2 focus:ring-primary/20 h-16 px-5 pr-14 text-xl placeholder:text-text-sub-light/70 dark:placeholder:text-text-sub-dark/70 transition-all z-10" id="password" placeholder="Password" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-0 top-0 bottom-0 z-20 flex h-full w-14 items-center justify-center rounded-r-xl text-text-sub-light dark:text-text-sub-dark hover:text-primary transition-colors focus:outline-none focus:text-primary" type="button">
<span class="material-symbols-outlined" style="font-size: 28px;">visibility</span>
</button>
</div>
</div>
<div class="h-4"></div>
<!-- Primary Action: Log In -->
<button class="flex w-full cursor-pointer items-center justify-center rounded-xl h-16 bg-primary hover:bg-primary/90 active:scale-[0.98] transition-all shadow-md text-[#161313] text-xl font-bold tracking-wide">
                    Log In
                </button>
<!-- Secondary Action: Face ID -->
<button class="group flex w-full cursor-pointer items-center justify-center gap-3 rounded-xl h-16 bg-transparent border-2 border-primary/50 hover:border-primary hover:bg-primary/5 active:scale-[0.98] transition-all text-text-main-light dark:text-text-main-dark text-lg font-semibold">
<span class="material-symbols-outlined text-primary group-hover:scale-110 transition-transform" style="font-size: 32px;">face</span>
<span>Log in with FaceID</span>
</button>
<!-- Footer Link -->
<div class="mt-4 flex justify-center">
<a class="text-text-sub-light dark:text-text-sub-dark hover:text-primary dark:hover:text-primary text-base font-medium underline decoration-transparent hover:decoration-current underline-offset-4 transition-all py-2 px-4" href="#">
                        Forgot Password?
                    </a>
</div>
</form>
</main>
<!-- Bottom Spacer to ensure content isn't flush with bottom edge on smaller screens -->
<div class="h-8 w-full bg-transparent"></div>
</div>
</body></html>
