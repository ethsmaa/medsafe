<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MedSafe Welcome Screen</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#dff1f1", // Pastel Mint Green
                        "accent": "#FFCCBC", // Soft Coral
                        "text-main": "#455A64", // Slate Blue
                        "background-light": "#f6f7f7",
                        "background-dark": "#151d1d",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "2xl": "2rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom accessibility focus styles */
        *:focus-visible {
            outline: 3px solid #FFCCBC;
            outline-offset: 2px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-primary min-h-screen flex flex-col font-display antialiased overflow-x-hidden">
<!-- Main Container -->
<main class="flex-grow flex flex-col w-full max-w-md mx-auto px-6 py-8 md:justify-center">
<!-- Header Section -->
<header class="flex flex-col items-center justify-center pt-8 pb-6 text-center">
<div class="w-20 h-20 bg-white rounded-full flex items-center justify-center shadow-md mb-6">
<span aria-hidden="true" class="material-symbols-outlined text-4xl text-text-main">medication</span>
</div>
<h1 class="text-text-main tracking-tight text-3xl font-extrabold leading-tight mb-3">
                Welcome to MedSafe
            </h1>
<p class="text-text-main/80 text-lg font-medium leading-normal max-w-[280px]">
                Please choose your role to continue.
            </p>
</header>
<!-- Role Selection Cards -->
<section aria-label="Role Selection" class="flex flex-col gap-6 w-full py-4">
<!-- Patient Card -->
<button class="group w-full bg-white hover:bg-white/90 active:scale-[0.98] transition-all duration-200 rounded-2xl shadow-[0_4px_20px_rgba(69,90,100,0.08)] p-6 text-left flex flex-row items-center gap-5 border-2 border-transparent focus:border-accent relative overflow-hidden">
<div class="absolute inset-0 bg-primary/20 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="w-24 h-24 shrink-0 rounded-xl overflow-hidden bg-primary/30 relative z-10">
<div class="w-full h-full bg-center bg-no-repeat bg-cover" data-alt="Illustration of a happy senior citizen smiling" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBsMntKyTn8zE5HB8LcQ0HaTWe611wGat3ydOEvTO5fWB03K_3gT_95Z5IoTSemzWUGtQcU2yfY1uDQwQ8hW7Ytw0nRn0cIPF4deTjzT94xcM5jddF7PdOepnjIaIioun6jwt7msSGBTjp4VcAlv2dbPRPFZCAer5rofxY0jQ4xMRnHPN-FgqwIEuAVSvXStNki_i1ilTXaB4HlmI-QSDviBkR1HWGFE8a_70hGD5J92M7QyB1JAx11AL1HYg7gUv0gEAmqCuhFyXYK");'></div>
</div>
<div class="flex flex-col z-10">
<h2 class="text-text-main text-2xl font-bold leading-tight mb-1">
                        I am a Patient
                    </h2>
<p class="text-text-main/70 text-base font-medium">
                        Manage my own medications
                    </p>
</div>
<div class="ml-auto text-primary z-10">
<span class="material-symbols-outlined text-4xl bg-primary/50 rounded-full p-1 text-text-main">arrow_forward</span>
</div>
</button>
<!-- Caregiver Card -->
<button class="group w-full bg-white hover:bg-white/90 active:scale-[0.98] transition-all duration-200 rounded-2xl shadow-[0_4px_20px_rgba(69,90,100,0.08)] p-6 text-left flex flex-row items-center gap-5 border-2 border-transparent focus:border-accent relative overflow-hidden">
<div class="absolute inset-0 bg-primary/20 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="w-24 h-24 shrink-0 rounded-xl overflow-hidden bg-primary/30 relative z-10">
<div class="w-full h-full bg-center bg-no-repeat bg-cover" data-alt="Illustration of a nurse or caregiver helping a patient" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuACOZG1QGN4-9WJnSPWBh4Vz617Et48BlbA1zKlt42but9ROmE9kKTRnvKHWeXxAgq7GMxHt0DBG2WN2qsf0oBiX8NgaRSxlAZWkg23ju9eLMZ-GWAAssfNN2-P-fh4lAlN_KtywZeQ3sWkwgk1__l5vbTeHw2T98rFHSX91ho3lGeWlg817D4rocaEyVxlRvOYMo72xEcSP7v0Qi-IS321110nW8jDInR7HSrG69Xwa-Fda5ggBUTfCCcL20ImPBsjZk8OTA-3p52m");'></div>
</div>
<div class="flex flex-col z-10">
<h2 class="text-text-main text-2xl font-bold leading-tight mb-1">
                        I am a Caregiver
                    </h2>
<p class="text-text-main/70 text-base font-medium">
                        Manage for others
                    </p>
</div>
<div class="ml-auto text-primary z-10">
<span class="material-symbols-outlined text-4xl bg-primary/50 rounded-full p-1 text-text-main">arrow_forward</span>
</div>
</button>
</section>
<!-- Footer -->
<footer class="mt-auto py-8 flex justify-center">
<a class="flex items-center gap-2 px-6 py-3 rounded-full bg-white/50 text-text-main font-semibold text-base hover:bg-white transition-colors focus:ring-2 focus:ring-accent" href="#">
<span class="material-symbols-outlined text-xl">help</span>
                Need help signing in?
            </a>
</footer>
</main>
</body></html>
